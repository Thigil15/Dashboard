<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Conexão Firebase</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .test-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
            border-left: 4px solid #ddd;
        }
        .test-item.pending {
            background: #fff3cd;
            border-color: #ffc107;
        }
        .test-item.success {
            background: #d4edda;
            border-color: #28a745;
        }
        .test-item.error {
            background: #f8d7da;
            border-color: #dc3545;
        }
        .test-title {
            font-weight: 600;
            margin-bottom: 5px;
        }
        .test-detail {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        .data-preview {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔥 Teste de Conexão Firebase</h1>
        <p>Este teste verifica se o site consegue se conectar ao Firebase Realtime Database e Auth.</p>
        
        <div id="test-results"></div>
        
        <button id="runTest" onclick="runTests()">▶️ Executar Testes de Conexão</button>
        <button id="runAuthTest" onclick="runAuthTests()" style="margin-left:10px;background:#34a853;">🔑 Testar Auth / Google Login</button>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js';
        import { getDatabase, ref, get, onValue } from 'https://www.gstatic.com/firebasejs/12.5.0/firebase-database.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js';
        
        // Import config
        import firebaseConfigModule from '../firebase-config.js';
        const firebaseConfig = firebaseConfigModule.firebaseConfig || firebaseConfigModule;
        
        // Make available globally for tests
        window.firebaseTest = {
            initializeApp,
            getDatabase,
            getAuth,
            GoogleAuthProvider,
            signInWithPopup,
            ref,
            get,
            onValue,
            firebaseConfig
        };
        
        window.dispatchEvent(new CustomEvent('firebaseTestReady'));
    </script>

    <script>
        let testResults = [];
        
        function addTestResult(title, status, detail = '', data = null) {
            testResults.push({ title, status, detail, data });
            renderResults();
        }
        
        function renderResults() {
            const container = document.getElementById('test-results');
            container.innerHTML = testResults.map(test => `
                <div class="test-item ${test.status}">
                    <div class="test-title">
                        ${test.status === 'success' ? '✅' : test.status === 'error' ? '❌' : '⏳'} 
                        ${test.title}
                    </div>
                    ${test.detail ? `<div class="test-detail">${test.detail}</div>` : ''}
                    ${test.data ? `<div class="data-preview">${JSON.stringify(test.data, null, 2)}</div>` : ''}
                </div>
            `).join('');
        }
        
        async function runTests() {
            const button = document.getElementById('runTest');
            button.disabled = true;
            button.textContent = '🔄 Testando...';
            testResults = [];
            
            try {
                // Test 1: Firebase SDK loaded
                addTestResult('1. Firebase SDK carregado', 'pending');
                await new Promise(resolve => {
                    if (window.firebaseTest) {
                        resolve();
                    } else {
                        window.addEventListener('firebaseTestReady', resolve, { once: true });
                    }
                });
                addTestResult('1. Firebase SDK carregado', 'success', 'Firebase SDK está disponível');
                
                // Test 2: Configuration valid
                addTestResult('2. Configuração do Firebase', 'pending');
                const config = window.firebaseTest.firebaseConfig;
                if (!config.databaseURL || config.databaseURL.includes('PLACEHOLDER')) {
                    throw new Error('databaseURL não configurado em firebase-config.js');
                }
                addTestResult('2. Configuração do Firebase', 'success', 
                    `Database URL: ${config.databaseURL}`, 
                    { projectId: config.projectId, databaseURL: config.databaseURL });
                
                // Test 3: Initialize Firebase
                addTestResult('3. Inicializar Firebase', 'pending');
                const app = window.firebaseTest.initializeApp(config);
                const db = window.firebaseTest.getDatabase(app);
                addTestResult('3. Inicializar Firebase', 'success', 'Firebase inicializado com sucesso');
                
                // Test 4: Check database connection
                addTestResult('4. Conectar ao Realtime Database', 'pending');
                const testRef = window.firebaseTest.ref(db, '.info/connected');
                const snapshot = await window.firebaseTest.get(testRef);
                const isConnected = snapshot.val();
                if (isConnected) {
                    addTestResult('4. Conectar ao Realtime Database', 'success', 
                        'Conexão com Firebase estabelecida!');
                } else {
                    throw new Error('Não conectado ao Firebase');
                }
                
                // Test 5: Check if cache exists (new architecture)
                addTestResult('5. Verificar estrutura /cache', 'pending');
                const cacheRef = window.firebaseTest.ref(db, 'cache');
                const cacheSnapshot = await window.firebaseTest.get(cacheRef);
                
                if (cacheSnapshot.exists()) {
                    const data = cacheSnapshot.val();
                    const keys = Object.keys(data || {});
                    addTestResult('5. Verificar estrutura /cache', 'success', 
                        `Encontrados ${keys.length} caminhos de dados`, 
                        { caminhos: keys.slice(0, 10) });
                } else {
                    addTestResult('5. Verificar estrutura /cache', 'error', 
                        '⚠️ O caminho /cache não existe ainda. O App Script precisa enviar dados primeiro.');
                }
                
                // Test 6: Check for Alunos data
                addTestResult('6. Verificar dados de Alunos', 'pending');
                const alunosRef = window.firebaseTest.ref(db, 'cache/Alunos/registros');
                const alunosSnapshot = await window.firebaseTest.get(alunosRef);
                
                if (alunosSnapshot.exists()) {
                    const alunos = alunosSnapshot.val();
                    const count = Array.isArray(alunos) ? alunos.length : Object.keys(alunos || {}).length;
                    addTestResult('6. Verificar dados de Alunos', 'success', 
                        `Encontrados ${count} alunos na base de dados`,
                        { primeiroAluno: Array.isArray(alunos) ? alunos[0] : alunos[Object.keys(alunos)[0]] });
                } else {
                    addTestResult('6. Verificar dados de Alunos', 'error', 
                        '⚠️ Dados de alunos não encontrados. Verifique se o App Script enviou os dados.');
                }
                
                // Final summary
                addTestResult('✨ Teste Completo', 'success', 
                    'Todos os testes de conexão foram executados! Verifique os resultados acima.');
                
            } catch (error) {
                addTestResult('❌ Erro no Teste', 'error', 
                    `Erro: ${error.message}`, 
                    { stack: error.stack });
            } finally {
                button.disabled = false;
                button.textContent = '🔄 Executar Testes Novamente';
            }
        }
        
        async function runAuthTests() {
            const button = document.getElementById('runAuthTest');
            button.disabled = true;
            button.textContent = '🔄 Testando Auth...';
            testResults = [];

            try {
                // Auth Test 1: SDK loaded
                addTestResult('Auth 1. Firebase SDK carregado', 'pending');
                await new Promise(resolve => {
                    if (window.firebaseTest) resolve();
                    else window.addEventListener('firebaseTestReady', resolve, { once: true });
                });
                addTestResult('Auth 1. Firebase SDK carregado', 'success', 'Firebase SDK disponível');

                // Auth Test 2: Config validation
                addTestResult('Auth 2. Validação da configuração', 'pending');
                const cfg = window.firebaseTest.firebaseConfig;
                const missingKeys = ['apiKey','authDomain','projectId'].filter(k => !cfg[k]);
                if (missingKeys.length) throw new Error(`Campos ausentes em firebaseConfig: ${missingKeys.join(', ')}`);
                if (!cfg.apiKey || cfg.apiKey.startsWith('SUA_') || cfg.apiKey === 'YOUR_API_KEY') {
                    throw new Error('apiKey é um placeholder. Copie a config real do Firebase Console.');
                }
                addTestResult('Auth 2. Validação da configuração', 'success',
                    `projectId: ${cfg.projectId} | authDomain: ${cfg.authDomain} | apiKey presente: ✅`);

                // Auth Test 3: Initialize Auth
                addTestResult('Auth 3. Inicializar Firebase Auth', 'pending');
                const app = window.firebaseTest.initializeApp(cfg, 'auth-diag-' + Date.now());
                const auth = window.firebaseTest.getAuth(app);
                addTestResult('Auth 3. Inicializar Firebase Auth', 'success', 'Auth inicializado com sucesso');

                // Auth Test 4: Google Provider
                addTestResult('Auth 4. Google Provider criado', 'pending');
                const provider = new window.firebaseTest.GoogleAuthProvider();
                addTestResult('Auth 4. Google Provider criado', 'success', 'GoogleAuthProvider instanciado');

                // Auth Test 5: Popup test (user-triggered)
                addTestResult('Auth 5. Testar popup Google', 'pending', '⏳ Abrindo popup de login Google... (pode levar alguns segundos)');
                try {
                    await window.firebaseTest.signInWithPopup(auth, provider);
                    addTestResult('Auth 5. Testar popup Google', 'success', '✅ Popup abriu e login concluído com sucesso!');
                } catch (popupError) {
                    const friendlyMap = {
                        'auth/popup-closed-by-user': 'Popup fechado pelo usuário (comportamento esperado para teste)',
                        'auth/popup-blocked': 'Popup bloqueado pelo navegador — habilite popups para este domínio',
                        'auth/unauthorized-domain': `Domínio não autorizado: ${location.hostname} — adicione em Firebase Console → Authentication → Authorized domains`,
                        'auth/operation-not-allowed': 'Provedor Google não habilitado — ative em Firebase Console → Authentication → Sign-in method',
                        'auth/api-key-not-valid.-please-pass-a-valid-api-key.': 'API Key inválida — copie a config correta do Firebase Console para firebase-config.js',
                        'auth/invalid-api-key': 'API Key inválida — copie a config correta do Firebase Console para firebase-config.js',
                    };
                    const isExpected = ['auth/popup-closed-by-user'].includes(popupError.code);
                    addTestResult('Auth 5. Testar popup Google',
                        isExpected ? 'success' : 'error',
                        friendlyMap[popupError.code] || `Erro (${popupError.code}): ${popupError.message}`);
                }

                addTestResult('✨ Diagnóstico de Auth Completo', 'success', 'Verifique os resultados acima e o console do navegador.');

            } catch (error) {
                addTestResult('❌ Erro no Diagnóstico de Auth', 'error',
                    `Erro: ${error.message}`, { stack: error.stack });
            } finally {
                button.disabled = false;
                button.textContent = '🔑 Testar Auth / Google Login';
            }
        }
        
        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                addTestResult('Pronto para testar', 'pending', 
                    'Clique nos botões abaixo para executar os testes de conexão ou de autenticação');
            }, 100);
        });
    </script>
</body>
</html>
